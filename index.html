<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sretan rođendan!</title>

<style>
    body {
    margin: 0;
    background: linear-gradient(135deg, #d7eaff, #b3d4ff);

    overflow: hidden;
    text-align: center;}

    h1 {
        color: #0a4fa3;
        font-size: 48px;
        margin-top: 30px;
        text-shadow: 0 0 10px rgba(0, 80, 200, 0.4);
        
    }

    
    #balon {
        width: 140px;
        position: absolute;
        cursor: pointer;
        transition: transform 0.2s;
    }

    #balon:hover {
        transform: scale(1.1);
    }

    #poruka {
        display: none;
        font-size: 55px;
        color: #004aad;
        margin-top: 150px;
        text-shadow: 0 0 15px rgba(0, 70, 180, 0.5);
    }
</style>
</head>

<body>

<h1>Ulovi Kiru!</h1>

<img id="balon" src="IMG_1183.PNG">
<div id="poruka">🎉❤️ Sretan rođendan! 😘🎉</div>

<script>
    const balon = document.getElementById("balon");
    const poruka = document.getElementById("poruka");

    function pomakniBalon() {
        let x = Math.random() * (window.innerWidth - 150);
        let y = Math.random() * (window.innerHeight - 250);

        balon.style.left = x + "px";
        balon.style.top = y + "px";
    }

    balon.onclick = () => {
        balon.style.display = "none";
        poruka.style.display = "block";
    };

    setInterval(pomakniBalon, 900);
    pomakniBalon();
</script>

</body>
</html>
